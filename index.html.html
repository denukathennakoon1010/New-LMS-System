<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denuka Thennakoon - Science</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>🔬 Denuka Thennakoon - Science</h1>
            <h2>විභාග පද්ධතියට සාදරයෙන් පිළිගනිමු</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">👤 පරිශීලක නම (Username)</label>
                    <input type="text" id="username" placeholder="ඔබගේ පරිශීලක නම ඇතුලත් කරන්න" required>
                </div>

                <div class="input-group">
                    <label for="password">🔒 මුරපදය (Password)</label>
                    <input type="password" id="password" placeholder="මුරපදය ඇතුලත් කරන්න" required>
                </div>

                <button type="submit" class="login-btn">පිවිසෙන්න (Login)</button>
                
                <div class="links">
                    <a href="#">මුරපදය අමතක වුණාද?</a>
                    <span>|</span>
                    <a href="#">නව ගිණුමක් සාදන්න</a>
                </div>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
